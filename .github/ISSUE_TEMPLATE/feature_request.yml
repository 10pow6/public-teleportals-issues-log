name: ✨ Feature Request
description: Suggest a new capability or improvement for TelePortals.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! ✨

        **Before you start:** please [search existing issues](https://github.com/10pow6/public-teleportals-issues-log/issues?q=is%3Aissue) — if your idea already exists, add a 👍 or comment instead of opening a duplicate.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem or opportunity does this address?
      description: What's frustrating today, or what would make TelePortals more useful?
      placeholder: I'd like to set a custom expiration date per link instead of only the tier default.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe your idea
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - URL shortening / links
        - Dashboard / Portal
        - Marketplace
        - Portal Coins / Economy
        - Analytics
        - Account / Billing
        - Integration API
        - UI / Quality of life
        - Something new
        - Other / Not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've thought about. (Optional)
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Mockups, examples from other tools, or extra context. (Optional)
    validations:
      required: false
